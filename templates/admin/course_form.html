{% extends "admin/base.html" %}

{% block title %}Create Course | Admin{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/admin" class="text-indigo-600 hover:text-indigo-900 transition flex items-center gap-1">
        &larr; Back to Dashboard
    </a>
</div>

<div class="bg-white shadow overflow-hidden sm:rounded-lg">
    <div class="px-4 py-5 sm:px-6">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Create New Course</h3>
        <p class="mt-1 max-w-2xl text-sm text-gray-500">Fill in the details to publish a new course.</p>
    </div>

    <div class="border-t border-gray-200 px-4 py-5 sm:px-6">
        <form action="/admin/courses/new" method="POST" enctype="multipart/form-data" class="space-y-6 max-w-3xl">
            <div>
                <label for="title" class="block text-sm font-medium text-gray-700">Course Title</label>
                <div>
                    <input type="text" name="title" id="title" required
                        class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border">
                </div>
            </div>

            <div>
                <label for="category_id" class="block text-sm font-medium text-gray-700">Course Category</label>
                <div class="mt-1">
                    <select id="category_id" name="category_id" required
                        class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border bg-white">
                        <option value="" disabled selected>-- 분류를 선택하세요 --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div>
                <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
                <div class="mt-1">
                    <textarea id="description" name="description" rows="4"
                        class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border border-gray-300 rounded-md py-2 px-3"></textarea>
                </div>
                <p class="mt-2 text-sm text-gray-500">Brief overview of what the course covers.</p>
            </div>

            <div>
                <label for="thumbnail" class="block text-sm font-medium text-gray-700">Thumbnail Image</label>
                <div class="mt-1 flex items-center">
                    <input type="file" name="thumbnail" id="thumbnail" accept="image/*"
                        class="focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300">
                </div>
                <p class="mt-2 text-sm text-gray-500">Optional: Upload an attractive cover image.</p>
            </div>

            <div class="pt-5 flex justify-end">
                <button type="button" onclick="window.history.back()"
                    class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Cancel
                </button>
                <button type="submit"
                    class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Save Course
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
