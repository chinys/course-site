{% extends "admin/base.html" %}

{% block title %}{{ "공지사항 수정" if notice else "새 공지사항 작성" }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-6">
        {{ "공지사항 수정" if notice else "새 공지사항 작성" }}
    </h1>

    <form method="POST" 
          action="{{ '/admin/notices/' + notice.id|string + '/edit' if notice else '/admin/notices/new' }}"
          class="bg-white rounded-lg shadow p-6">
        
        <div class="mb-6">
            <label for="title" class="block text-sm font-medium text-gray-700 mb-2">
                제목 <span class="text-red-500">*</span>
            </label>
            <input type="text" 
                   id="title" 
                   name="title" 
                   required
                   value="{{ notice.title if notice else '' }}"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                   placeholder="공지사항 제목을 입력하세요">
        </div>

        <div class="mb-6">
            <label for="content" class="block text-sm font-medium text-gray-700 mb-2">
                내용 <span class="text-red-500">*</span>
            </label>
            <textarea id="content" 
                      name="content" 
                      required
                      rows="12"
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                      placeholder="공지사항 내용을 입력하세요.">{{ notice.content if notice else '' }}</textarea>
        </div>

        <div class="mb-6 grid grid-cols-2 gap-4">
            <div class="flex items-center">
                <input type="checkbox"
                       id="is_pinned"
                       name="is_pinned"
                       value="true"
                       {{ "checked" if notice and notice.is_pinned else "" }}
                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="is_pinned" class="ml-2 block text-sm text-gray-700">
                    고정 공지 (상단 표시)
                </label>
            </div>

            <div class="flex items-center">
                <input type="checkbox"
                       id="is_active"
                       name="is_active"
                       value="true"
                       {{ "checked" if notice and notice.is_active else "" }}
                       class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                <label for="is_active" class="ml-2 block text-sm text-gray-700">
                    활성화
                </label>
            </div>
        </div>

        <div class="flex gap-3">
            <button type="submit" 
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-medium transition">
                {{ "수정하기" if notice else "작성하기" }}
            </button>
            <a href="/admin/notices" 
               class="flex-none bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-3 rounded-lg font-medium transition">
                목록으로
            </a>
        </div>
    </form>
</div>
{% endblock %}
