{% extends "admin/base.html" %}

{% block title %}Add Lesson | Admin{% endblock %}

{% block extra_head %}
<!-- TinyMCE CDN (Open Source via cdnjs) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.2/tinymce.min.js" referrerpolicy="origin"></script>
<script>
    tinymce.init({
        selector: '#content',
        height: 500,
        plugins: [
            'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview',
            'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
            'insertdatetime', 'media', 'table', 'help', 'wordcount'
        ],
        toolbar: 'undo redo | blocks | ' +
            'bold italic backcolor | alignleft aligncenter ' +
            'alignright alignjustify | bullist numlist outdent indent | ' +
            'removeformat | help',
        content_style: 'body { font-family:Helvetica,Arial,sans-serif; font-size:16px }'
    });
</script>
{% endblock %}

{% block content %}
<div class="mb-6">
    <a href="/admin/courses/{{ course.id }}"
        class="text-indigo-600 hover:text-indigo-900 transition flex items-center gap-1">
        &larr; Back to Course
    </a>
</div>

<div class="bg-white shadow overflow-hidden sm:rounded-lg">
    <div class="px-4 py-5 sm:px-6">
        <h3 class="text-lg leading-6 font-medium text-gray-900">Add Lesson to "{{ course.title }}"</h3>
    </div>

    <div class="border-t border-gray-200 px-4 py-5 sm:px-6">
        <form action="/admin/courses/{{ course.id }}/lessons/new" method="POST" class="space-y-6">
            <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700">Lesson Title</label>
                    <div class="mt-1">
                        <input type="text" name="title" id="title" required
                            class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border">
                    </div>
                </div>
                <div>
                    <label for="order" class="block text-sm font-medium text-gray-700">Order</label>
                    <div class="mt-1">
                        <input type="number" name="order" id="order" required value="0"
                            class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 block w-full sm:text-sm border-gray-300 rounded-md py-2 px-3 border">
                    </div>
                </div>
            </div>

            <div>
                <label for="content" class="block text-sm font-medium text-gray-700 mb-2">Lesson Content</label>
                <!-- This textarea will be replaced by TinyMCE -->
                <textarea id="content" name="content"></textarea>
            </div>

            <div class="pt-5 flex justify-end">
                <button type="submit"
                    class="ml-3 inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                    Save Lesson
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
