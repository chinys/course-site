{% extends "public/base.html" %}

{% block title %}{{ notice.title }}{% endblock %}

{% block content %}
<div class="bg-white shadow-md rounded-lg overflow-hidden">
    <div class="px-6 py-4 border-b border-gray-200">
        <div class="flex items-center gap-2 mb-2">
            {% if notice.is_pinned %}
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800">
                고정
            </span>
            {% endif %}
            <span class="text-sm text-gray-500">
                {{ notice.created_at.strftime("%Y-%m-%d %H:%M") }}
            </span>
        </div>
        <h1 class="text-2xl font-bold text-gray-900">{{ notice.title }}</h1>
    </div>

    <div class="px-6 py-6">
        <div class="prose max-w-none">
            <div class="whitespace-pre-wrap text-gray-900">{{ notice.content }}</div>
        </div>
    </div>

    <div class="px-6 py-4 bg-gray-50 border-t border-gray-200">
        <a href="/notices" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
            ← 목록으로
        </a>
    </div>
</div>
{% endblock %}
